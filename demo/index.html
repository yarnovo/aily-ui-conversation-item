<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>akong ConversationItem · demo</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/yarnovo/akong-tokens@main/src/tokens.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/yarnovo/akong-tokens@main/src/tokens.dark.css" />
<link rel="stylesheet" href="../src/ConversationItem.css" />
<style>
  body {
    font-family: var(--ak-font-sans);
    background: var(--ak-bg);
    color: var(--ak-fg);
    margin: 0;
    padding: var(--ak-space-6);
    max-width: 760px;
    margin-inline: auto;
  }
  h1 { font-size: var(--ak-text-2xl); font-weight: var(--ak-weight-semibold); letter-spacing: var(--ak-tracking-tight); margin: 0 0 var(--ak-space-2); }
  .sub { color: var(--ak-fg-subtle); font-size: var(--ak-text-sm); margin-bottom: var(--ak-space-8); }
  h2 { font-size: var(--ak-text-md); font-weight: var(--ak-weight-semibold); margin: var(--ak-space-8) 0 var(--ak-space-3); }
  .row { display: flex; gap: var(--ak-space-3); flex-wrap: wrap; align-items: center; padding: var(--ak-space-3); background: var(--ak-bg-subtle); border-radius: var(--ak-radius-md); }
  .toggle { position: fixed; top: 16px; right: 16px; padding: 8px 12px; border-radius: var(--ak-radius-full); background: var(--ak-fg); color: var(--ak-bg); border: 0; font-size: var(--ak-text-sm); cursor: pointer; }
</style>
</head>
<body>
  <button class="toggle" id="t">切换暗色</button>
  <h1>akong ConversationItem</h1>
  <p class="sub">5 variant · 3 size · 跨 Web/RN · 真值跨端 · 一份 props</p>

  <h2>Variants (size=md)</h2>
  <div class="row">
    <button class="ak-conversation-item ak-conversation-item--primary ak-conversation-item--md"><span>Primary</span></button>
    <button class="ak-conversation-item ak-conversation-item--secondary ak-conversation-item--md"><span>Secondary</span></button>
    <button class="ak-conversation-item ak-conversation-item--ghost ak-conversation-item--md"><span>Ghost</span></button>
    <button class="ak-conversation-item ak-conversation-item--destructive ak-conversation-item--md"><span>Destructive</span></button>
    <button class="ak-conversation-item ak-conversation-item--link"><span>Link</span></button>
  </div>

  <h2>Sizes (variant=primary)</h2>
  <div class="row">
    <button class="ak-conversation-item ak-conversation-item--primary ak-conversation-item--sm"><span>Small</span></button>
    <button class="ak-conversation-item ak-conversation-item--primary ak-conversation-item--md"><span>Medium</span></button>
    <button class="ak-conversation-item ak-conversation-item--primary ak-conversation-item--lg"><span>Large</span></button>
  </div>

  <h2>States</h2>
  <div class="row">
    <button class="ak-conversation-item ak-conversation-item--primary ak-conversation-item--md"><span>Default</span></button>
    <button class="ak-conversation-item ak-conversation-item--primary ak-conversation-item--md ak-conversation-item--loading"><span>Loading</span></button>
    <button class="ak-conversation-item ak-conversation-item--primary ak-conversation-item--md" disabled><span>Disabled</span></button>
  </div>

  <h2>With Icons</h2>
  <div class="row">
    <button class="ak-conversation-item ak-conversation-item--primary ak-conversation-item--md">
      <span class="ak-conversation-item__icon">+</span>
      <span>Add</span>
    </button>
    <button class="ak-conversation-item ak-conversation-item--secondary ak-conversation-item--md">
      <span>Next</span>
      <span class="ak-conversation-item__icon">→</span>
    </button>
    <button class="ak-conversation-item ak-conversation-item--ghost ak-conversation-item--md" aria-label="search">
      <span class="ak-conversation-item__icon">🔍</span>
    </button>
  </div>

  <h2>Full width</h2>
  <div class="row" style="display: block;">
    <button class="ak-conversation-item ak-conversation-item--primary ak-conversation-item--md ak-conversation-item--full-width"><span>占满整行</span></button>
  </div>

<script>
  document.getElementById('t').onclick = () => {
    document.documentElement.classList.toggle('dark')
  }
</script>
</body>
</html>
