<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>akong ConversationItem · demo</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/yarnovo/akong-tokens@main/src/tokens.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/yarnovo/akong-tokens@main/src/tokens.dark.css" />
<link rel="stylesheet" href="../src/ConversationItem.css" />
<style>
  body {
    font-family: var(--ak-font-sans);
    background: var(--ak-bg);
    color: var(--ak-fg);
    margin: 0;
    padding: var(--ak-space-6);
    max-width: 480px;
    margin-inline: auto;
  }
  h1 {
    font-size: var(--ak-text-2xl);
    font-weight: var(--ak-weight-semibold);
    letter-spacing: var(--ak-tracking-tight);
    margin: 0 0 var(--ak-space-2);
  }
  .sub {
    color: var(--ak-fg-subtle);
    font-size: var(--ak-text-sm);
    margin-bottom: var(--ak-space-6);
  }
  h2 {
    font-size: var(--ak-text-md);
    font-weight: var(--ak-weight-semibold);
    margin: var(--ak-space-6) 0 var(--ak-space-2);
  }
  .list {
    background: var(--ak-bg);
    border: 1px solid var(--ak-border-subtle);
    border-radius: var(--ak-radius-md);
    overflow: hidden;
  }
  .list .ak-conversation-item + .ak-conversation-item {
    border-top: 1px solid var(--ak-border-subtle);
  }
  .toggle {
    position: fixed;
    top: 64px;
    right: 16px;
    padding: 8px 12px;
    border-radius: var(--ak-radius-full);
    background: var(--ak-fg);
    color: var(--ak-bg);
    border: 0;
    font-size: var(--ak-text-sm);
    cursor: pointer;
  }
  .pinned-bg { background: var(--ak-bg-subtle); }
  .back-to-index {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 100;
    padding: 8px 16px;
    background: var(--ak-bg-elevated);
    border: 1px solid var(--ak-border-subtle);
    border-radius: var(--ak-radius-full);
    color: var(--ak-fg-muted);
    text-decoration: none;
    font-size: var(--ak-text-sm);
    box-shadow: var(--ak-shadow-sm);
    transition: all 0.2s;
  }
  .back-to-index:hover {
    background: var(--ak-bg-hover);
    color: var(--ak-fg);
  }
</style>
</head>
<body>
  <a href="https://yarnovo.github.io/aily-ui-core/" class="back-to-index">← 回 aily-ui 总站</a>
  <button class="toggle" id="t">切换暗色</button>
  <h1>akong ConversationItem</h1>
  <p class="sub">类微信聊天列表项 · 跨 Web / RN · 一份 props · 8+ 变体</p>

  <h2>会话列表 · 8 变体</h2>
  <div class="list">
    <!-- 1. 默认 · 简洁 -->
    <button class="ak-conversation-item" type="button" aria-label="王芳 hi">
      <span class="ak-conversation-item__avatar-wrap">
        <span class="ak-conversation-item__avatar-fallback" aria-hidden="true">王</span>
      </span>
      <span class="ak-conversation-item__body">
        <span class="ak-conversation-item__row-top">
          <span class="ak-conversation-item__name">王芳</span>
        </span>
        <span class="ak-conversation-item__last-message">在吗？</span>
      </span>
      <span class="ak-conversation-item__meta">
        <span class="ak-conversation-item__time">刚刚</span>
      </span>
    </button>

    <!-- 2. unread 5 -->
    <button class="ak-conversation-item" type="button" aria-label="李四 5 条未读">
      <span class="ak-conversation-item__avatar-wrap">
        <span class="ak-conversation-item__avatar-fallback" aria-hidden="true">李</span>
      </span>
      <span class="ak-conversation-item__body">
        <span class="ak-conversation-item__row-top">
          <span class="ak-conversation-item__name">李四</span>
        </span>
        <span class="ak-conversation-item__last-message">下午开会改到 3 点</span>
      </span>
      <span class="ak-conversation-item__meta">
        <span class="ak-conversation-item__time">12:34</span>
        <span class="ak-conversation-item__unread">5</span>
      </span>
    </button>

    <!-- 3. unread 99+ · 工作群 -->
    <button class="ak-conversation-item" type="button" aria-label="工作群 99+ 未读">
      <span class="ak-conversation-item__avatar-wrap">
        <span class="ak-conversation-item__avatar-fallback" aria-hidden="true">工</span>
      </span>
      <span class="ak-conversation-item__body">
        <span class="ak-conversation-item__row-top">
          <span class="ak-conversation-item__name">阿空团队 · 工作群</span>
        </span>
        <span class="ak-conversation-item__last-message">老板: 周会改到明天 9 点</span>
      </span>
      <span class="ak-conversation-item__meta">
        <span class="ak-conversation-item__time">11:20</span>
        <span class="ak-conversation-item__unread">99+</span>
      </span>
    </button>

    <!-- 4. pinned · 置顶 -->
    <button class="ak-conversation-item pinned-bg" type="button" aria-label="老婆 置顶">
      <span class="ak-conversation-item__avatar-wrap">
        <span class="ak-conversation-item__avatar-fallback" aria-hidden="true">老</span>
      </span>
      <span class="ak-conversation-item__body">
        <span class="ak-conversation-item__row-top">
          <span class="ak-conversation-item__name">老婆</span>
          <span class="ak-conversation-item__pin">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M14 4l6 6-4 1-3 3v5l-2 2-3-3-4 4-1-1 4-4-3-3 2-2h5l3-3 1-4z"/></svg>
          </span>
        </span>
        <span class="ak-conversation-item__last-message">晚上吃烤鱼？</span>
      </span>
      <span class="ak-conversation-item__meta">
        <span class="ak-conversation-item__time">昨天</span>
        <span class="ak-conversation-item__unread">2</span>
      </span>
    </button>

    <!-- 5. muted · 静音 -->
    <button class="ak-conversation-item ak-conversation-item--muted" type="button" aria-label="校友群 静音">
      <span class="ak-conversation-item__avatar-wrap">
        <span class="ak-conversation-item__avatar-fallback" aria-hidden="true">校</span>
      </span>
      <span class="ak-conversation-item__body">
        <span class="ak-conversation-item__row-top">
          <span class="ak-conversation-item__name">2010 级校友群</span>
          <span class="ak-conversation-item__mute">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13.73 21a2 2 0 0 1-3.46 0"/><path d="M18.63 13A17.89 17.89 0 0 1 18 8"/><path d="M6.26 6.26A5.86 5.86 0 0 0 6 8c0 7-3 9-3 9h14"/><path d="M18 8a6 6 0 0 0-9.33-5"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </span>
        </span>
        <span class="ak-conversation-item__last-message">[图片]</span>
      </span>
      <span class="ak-conversation-item__meta">
        <span class="ak-conversation-item__time">2 天前</span>
        <span class="ak-conversation-item__unread">36</span>
      </span>
    </button>

    <!-- 6. online · 在线 -->
    <button class="ak-conversation-item" type="button" aria-label="项目经理 张总 在线">
      <span class="ak-conversation-item__avatar-wrap">
        <span class="ak-conversation-item__avatar-fallback" aria-hidden="true">张</span>
        <span class="ak-conversation-item__online-dot"></span>
      </span>
      <span class="ak-conversation-item__body">
        <span class="ak-conversation-item__row-top">
          <span class="ak-conversation-item__name">张总</span>
        </span>
        <span class="ak-conversation-item__last-message">收到</span>
      </span>
      <span class="ak-conversation-item__meta">
        <span class="ak-conversation-item__time">10:02</span>
      </span>
    </button>

    <!-- 7. 长内容 · truncate -->
    <button class="ak-conversation-item" type="button" aria-label="长名字会话">
      <span class="ak-conversation-item__avatar-wrap">
        <span class="ak-conversation-item__avatar-fallback" aria-hidden="true">超</span>
      </span>
      <span class="ak-conversation-item__body">
        <span class="ak-conversation-item__row-top">
          <span class="ak-conversation-item__name">超长群名 · 阿空智能科技 2026 春季全员战略对齐 · 红娘 + 大眼 + 小喜</span>
        </span>
        <span class="ak-conversation-item__last-message">这是一条很长很长很长的最后一条消息预览 · 单行 truncate · 不换行 · 后面应该被省略号截掉</span>
      </span>
      <span class="ak-conversation-item__meta">
        <span class="ak-conversation-item__time">9:00</span>
        <span class="ak-conversation-item__unread">7</span>
      </span>
    </button>

    <!-- 8. 复合 · pinned + muted + online + unread -->
    <button class="ak-conversation-item ak-conversation-item--muted pinned-bg" type="button" aria-label="家人群 置顶静音在线">
      <span class="ak-conversation-item__avatar-wrap">
        <span class="ak-conversation-item__avatar-fallback" aria-hidden="true">家</span>
        <span class="ak-conversation-item__online-dot"></span>
      </span>
      <span class="ak-conversation-item__body">
        <span class="ak-conversation-item__row-top">
          <span class="ak-conversation-item__name">家人群</span>
          <span class="ak-conversation-item__pin">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M14 4l6 6-4 1-3 3v5l-2 2-3-3-4 4-1-1 4-4-3-3 2-2h5l3-3 1-4z"/></svg>
          </span>
          <span class="ak-conversation-item__mute">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13.73 21a2 2 0 0 1-3.46 0"/><path d="M18.63 13A17.89 17.89 0 0 1 18 8"/><path d="M6.26 6.26A5.86 5.86 0 0 0 6 8c0 7-3 9-3 9h14"/><path d="M18 8a6 6 0 0 0-9.33-5"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </span>
        </span>
        <span class="ak-conversation-item__last-message">妈妈: 晚上视频</span>
      </span>
      <span class="ak-conversation-item__meta">
        <span class="ak-conversation-item__time">19:00</span>
        <span class="ak-conversation-item__unread">12</span>
      </span>
    </button>
  </div>

  <h2>暗色模式</h2>
  <p class="sub">右上角"切换暗色"按钮 · 整页切 .dark 类 · 自动跟 token 暗色变量</p>

<script>
  document.getElementById('t').onclick = () => {
    document.documentElement.classList.toggle('dark')
  }
</script>
</body>
</html>
